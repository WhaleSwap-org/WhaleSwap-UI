name: Unit Tests (UI PR)

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  unit-tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Summarize coverage
        if: always()
        shell: bash
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage summary was not generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
          const total = summary.total;
          const formatMetric = (metric) => {
            if (!metric || metric.total === 0) {
              return `n/a (${metric?.covered ?? 0}/${metric?.total ?? 0})`;
            }
            return `${metric.pct}% (${metric.covered}/${metric.total})`;
          };

          const lowestFiles = Object.entries(summary)
            .filter(([name]) => name !== 'total')
            .map(([name, data]) => ({
              file: path.relative(process.cwd(), name).replace(/\\/g, '/'),
              statements: data.statements,
              branches: data.branches,
              functions: data.functions,
              lines: data.lines
            }))
            .sort((a, b) => a.statements.pct - b.statements.pct)
            .slice(0, 5);

          const lines = [
            '## Coverage Summary',
            '',
            `- Statements: ${formatMetric(total.statements)}`,
            `- Branches: ${formatMetric(total.branches)}`,
            `- Functions: ${formatMetric(total.functions)}`,
            `- Lines: ${formatMetric(total.lines)}`
          ];

          if (lowestFiles.length > 0) {
            lines.push(
              '',
              '### Lowest Statement Coverage',
              '',
              '```text'
            );

            for (const file of lowestFiles) {
              lines.push(
                `${file.file}`,
                `  stmts ${formatMetric(file.statements)} | funcs ${formatMetric(file.functions)} | lines ${formatMetric(file.lines)} | branches ${formatMetric(file.branches)}`
              );
            }

            lines.push('```');
          }

          const output = `${lines.join('\n')}\n`;
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, output);
          process.stdout.write(output);
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whaleswap-ui-coverage
          path: coverage
